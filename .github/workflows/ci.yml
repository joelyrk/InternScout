name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify repository foundation
        run: npm run verify

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config --quiet

  api:
    name: API checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: internscout_test
          POSTGRES_USER: internscout
          POSTGRES_PASSWORD: synthetic-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U internscout -d internscout_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      INTERNSCOUT_DATABASE_URL: postgresql+psycopg://internscout:synthetic-ci-password@localhost:5432/internscout
      INTERNSCOUT_TEST_DATABASE_URL: postgresql+psycopg://internscout:synthetic-ci-password@localhost:5432/internscout_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.24"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install locked dependencies
        run: uv sync --locked
        working-directory: apps/api

      - name: Check dependency lock
        run: uv lock --check
        working-directory: apps/api

      - name: Lint
        run: uv run --locked ruff check .
        working-directory: apps/api

      - name: Check formatting
        run: uv run --locked black --check .
        working-directory: apps/api

      - name: Type check
        run: uv run --locked pyright
        working-directory: apps/api

      - name: Test
        run: uv run --locked pytest --cov=internscout_api --cov-report=term-missing
        working-directory: apps/api
